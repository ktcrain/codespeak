<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeSpeak — Test Runner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #010101; --card: #111; --border: #2a2a2a; --muted: #888;
      --red: #fe2c55; --cyan: #25f4ee;
      --pass: #1a3a1a; --pass-text: #4caf50; --pass-border: #2d5a2d;
      --fail: #3a0a0a; --fail-text: #ff6b6b; --fail-border: #7a1a1a;
      --skip: #1a1a2a; --skip-text: #aaaaff; --skip-border: #2a2a5a;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #f0f0f0; padding: 2rem 1rem; }
    h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, var(--red), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .summary {
      display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 800; }
    .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .stat.pass .stat-num { color: var(--pass-text); }
    .stat.fail .stat-num { color: var(--fail-text); }
    .stat.skip .stat-num { color: var(--skip-text); }
    .stat.total .stat-num { color: var(--cyan); }
    .controls { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    button { padding: 0.5rem 1.2rem; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
    .btn-run { background: linear-gradient(135deg, var(--red), #ff4f6d); color: #fff; }
    .btn-filter { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
    .btn-filter.active { border-color: var(--cyan); color: var(--cyan); }
    .progress { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--cyan)); width: 0; transition: width 0.2s; }
    .test-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .test-item { border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.83rem; line-height: 1.5; border: 1px solid; }
    .test-item.pass { background: var(--pass); border-color: var(--pass-border); }
    .test-item.fail { background: var(--fail); border-color: var(--fail-border); }
    .test-item.skip { background: var(--skip); border-color: var(--skip-border); }
    .test-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
    .test-id { font-family: monospace; font-size: 0.72rem; color: var(--muted); }
    .test-status { font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .test-item.pass .test-status { color: var(--pass-text); }
    .test-item.fail .test-status { color: var(--fail-text); }
    .test-item.skip .test-status { color: var(--skip-text); }
    .test-input { font-family: monospace; background: #000; padding: 0.2rem 0.4rem; border-radius: 4px; color: #eee; font-size: 0.8rem; word-break: break-all; }
    .test-note { color: var(--muted); font-size: 0.75rem; margin-top: 0.2rem; }
    .test-detail { margin-top: 0.4rem; font-size: 0.78rem; color: #bbb; }
    .test-detail span { display: inline-block; margin-right: 0.4rem; padding: 0.1rem 0.35rem; border-radius: 3px; font-family: monospace; font-size: 0.73rem; }
    .got-block { background: #3a0a0a; color: #ff8888; border: 1px solid #ff4444; }
    .got-suggest { background: #2a2000; color: #ffcc44; border: 1px solid #ffaa00; }
    .got-review { background: #0d1a2a; color: #88aaff; border: 1px solid #4488ff; }
    .got-none { background: #1a1a1a; color: #555; border: 1px solid #333; }
    .expected-label { color: #555; font-size: 0.72rem; }
    .loading { color: var(--muted); padding: 2rem; text-align: center; }
  </style>
</head>

// ── PASTE DETECTION ENGINE INLINE (must stay in sync with index.html) ─────────
const LEET = { '4':'a','@':'a','3':'e','1':'i','!':'i','|':'i','0':'o','5':'s','$':'s','7':'t','8':'b','6':'g','9':'g' };

function buildNorm(original) {
  const lower = original.normalize('NFKC').toLowerCase();
  let s1 = '', s1map = [];
  for (let i = 0; i < lower.length; i++) { s1 += LEET[lower[i]] ?? lower[i]; s1map.push(i); }
  let s2 = '', s2map = [], i = 0;
  while (i < s1.length) {
    const c = s1[i]; s2 += c; s2map.push(s1map[i]); i++;
    if (i < s1.length && s1[i] === c) { s2 += c; s2map.push(s1map[i]); i++; while (i < s1.length && s1[i] === c) i++; }
  }
  let normText = '', normToOrig = [];
  for (let k = 0; k < s2.length; k++) {
    const c = s2[k];
    if (/[-.*_~^|\\]/.test(c)) {
      const prev = k > 0 ? s2[k-1] : '', next = k < s2.length-1 ? s2[k+1] : '';
      if (/[a-z]/.test(prev) && /[a-z]/.test(next)) continue;
    }
    normText += c; normToOrig.push(s2map[k]);
  }
  return { normText, normToOrig };
}

function normalize(str) {
  let s = str.normalize('NFKC').toLowerCase();
  s = s.split('').map(c => LEET[c] ?? c).join('');
  s = s.replace(/(.)\1{2,}/g, '$1$1');
  s = s.replace(/(?<=[a-z])[-.*_~^|\\]+(?=[a-z])/g, '');
  return s;
}

function detect(originalText) {
  const { normText, normToOrig } = buildNorm(originalText);
  const results = [];
  for (const rule of RULES) {
    const pat = rule.match instanceof RegExp
      ? new RegExp(rule.match.source, 'gi')
      : new RegExp('(?<![a-z])' + escRe(normalize(rule.match)) + '(?![a-z])', 'gi');
    let m;
    while ((m = pat.exec(normText)) !== null) {
      const ns = m.index, ne = m.index + m[0].length;
      const origStart = normToOrig[ns];
      const origEnd = (normToOrig[ne-1] ?? normToOrig[normToOrig.length-1]) + 1;
      let s = origStart, e = origEnd;
      while (s > 0 && /\w/.test(originalText[s-1])) s--;
      while (e < originalText.length && /\w/.test(originalText[e])) e++;
      results.push({ start:s, end:e, origText:originalText.slice(s,e), severity:rule.severity, category:rule.category });
    }
  }
  results.sort((a,b) => a.start - b.start);
  const merged = []; let cursor = 0;
  for (const r of results) { if (r.start >= cursor) { merged.push(r); cursor = r.end; } }
  return merged;
}

function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function runTest(t) {
  // Tests with expect:[] with note containing "false positive" or "no flag" — skip if empty expect array
  const got = detect(t.input);
  const gotSeverities = got.map(r => r.severity);

  if (t.expect.length === 0) {
    // Expect NOTHING flagged
    if (got.length === 0) return { status:'pass', got, expected:[] };
    // Allow 'review' flags on false-positive tests — only fail on block/suggest
    const serious = got.filter(r => r.severity !== 'review');
    if (serious.length === 0) return { status:'skip', got, expected:[], note:'review-only flags (acceptable)' };
    return { status:'fail', got, expected:[], reason:`Expected no flags, got: ${gotSeverities.join(', ')}` };
  }

  // Check that every expected severity appears at least once
  const missing = t.expect.filter(e => !gotSeverities.includes(e));
  if (missing.length > 0) {
    return { status:'fail', got, expected:t.expect, reason:`Missing: ${missing.join(', ')}` };
  }
  return { status:'pass', got, expected:t.expect };
}

function runAll() {
  document.getElementById('test-list').innerHTML = '<div class="loading">Running…</div>';
  if (!allTests.length) allTests = loadTests();

  let pass = 0, fail = 0, skip = 0;
  renderedResults = [];

  for (let i = 0; i < allTests.length; i++) {
    const t = allTests[i];
    const result = runTest(t);
    renderedResults.push({ t, result });
    if (result.status === 'pass') pass++;
    else if (result.status === 'fail') fail++;
    else skip++;
    document.getElementById('progress-bar').style.width = ((i+1)/allTests.length*100) + '%';
  }

  document.getElementById('s-total').textContent = allTests.length;
  document.getElementById('s-pass').textContent  = pass;
  document.getElementById('s-fail').textContent  = fail;
  document.getElementById('s-skip').textContent  = skip;

  renderList();
}

function renderList() {
  const filtered = currentFilter === 'all'
    ? renderedResults
    : renderedResults.filter(r => r.result.status === currentFilter);

  document.getElementById('test-list').innerHTML = filtered.map(({ t, result }) => {
    const gotHtml = result.got.length
      ? result.got.map(r => `<span class="got-${r.severity}">${esc(r.severity)}: ${esc(r.origText)}</span>`).join(' ')
      : '<span class="got-none">none</span>';
    const expectedHtml = t.expect.length
      ? t.expect.map(e => `<span class="got-${e}">${esc(e)}</span>`).join(' ')
      : '<span class="got-none">none</span>';
    return `<div class="test-item ${result.status}">
      <div class="test-header">
        <span class="test-id">#${t.id}</span>
        <span class="test-status">${result.status}${result.result && result.result.note ? ' ('+result.result.note+')' : ''}</span>
        <span class="test-input">${esc(t.input)}</span>
      </div>
      <div class="test-note">${esc(t.note)}</div>
      <div class="test-detail">
        <span class="expected-label">Expected:</span> ${expectedHtml}
        &nbsp;&nbsp;
        <span class="expected-label">Got:</span> ${gotHtml}
        ${result.reason ? `&nbsp;&nbsp;<span style="color:#ff6b6b">${esc(result.reason)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  ['all','pass','fail','skip'].forEach(k => {
    document.getElementById('f-'+k).classList.toggle('active', k === f);
  });
  renderList();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
